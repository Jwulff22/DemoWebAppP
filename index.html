function Badge({label,color}){return <span style={{background:color,color:"#fff",borderRadius:20,padding:"3px 10px",fontSize:12,fontWeight:600,whiteSpace:"nowrap"}}>{label}</span>;}

// ── SVG Icons (no emojis) ─────────────────────────────────────────────────────
function Icon({name,size=18,color="currentColor",strokeWidth=2}){
  const s={width:size,height:size,display:"block",flexShrink:0};
  const p={fill:"none",stroke:color,strokeWidth,strokeLinecap:"round",strokeLinejoin:"round"};
  switch(name){
    case"swap":   return <svg style={s} viewBox="0 0 24 24" {...p}><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>;
    case"mail":   return <svg style={s} viewBox="0 0 24 24" {...p}><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>;
    case"megaphone":return <svg style={s} viewBox="0 0 24 24" {...p}><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>;
    case"clipboard":return <svg style={s} viewBox="0 0 24 24" {...p}><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>;
    case"clock":  return <svg style={s} viewBox="0 0 24 24" {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
    case"bell":   return <svg style={s} viewBox="0 0 24 24" {...p}><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>;
    case"check":  return <svg style={s} viewBox="0 0 24 24" {...p}><polyline points="20 6 9 17 4 12"/></svg>;
    case"x":      return <svg style={s} viewBox="0 0 24 24" {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
    case"alert":  return <svg style={s} viewBox="0 0 24 24" {...p}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>;
    case"hourglass":return <svg style={s} viewBox="0 0 24 24" {...p}><path d="M5 22h14"/><path d="M5 2h14"/><path d="M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414 4.414A2 2 0 0 0 7 17.828V22"/><path d="M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414-4.414A2 2 0 0 0 17 6.172V2"/></svg>;
    case"lock":   return <svg style={s} viewBox="0 0 24 24" {...p}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
    case"circle": return <svg style={s} viewBox="0 0 24 24" {...p}><circle cx="12" cy="12" r="10"/></svg>;
    case"phone":  return <svg style={s} viewBox="0 0 24 24" {...p}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.46 2 2 0 0 1 3.6 1.28h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6 6l.95-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16.92z"/></svg>;
    case"search": return <svg style={s} viewBox="0 0 24 24" {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
    case"chevron-right":return <svg style={s} viewBox="0 0 24 24" {...p}><polyline points="9 18 15 12 9 6"/></svg>;
    case"dot-green":return <svg style={s} viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill={color} stroke="none"/></svg>;
    default: return null;
  }
}

function notifTypeIcon(type, active){
  const color = active ? GREEN : "#9CA3AF";
  switch(type){
    case"byt":    return <Icon name="swap"      size={18} color={color}/>;
    case"besked": return <Icon name="mail"      size={18} color={color}/>;
    case"udbud":  return <Icon name="megaphone" size={18} color={color}/>;
    case"onske":  return <Icon name="clipboard" size={18} color={color}/>;
    default:      return <Icon name="bell"      size={18} color={color}/>;
  }
}

// ── Notifikationscenter panel ─────────────────────────────────────────────────
function NotifPanel({onClose, onNavigate, readNotifIds, markRead}){
  const items = NOTIF_FEED.map(n=>({...n, read: n.read || readNotifIds.has(n.id)}));
  const unread = items.filter(n=>!n.read).length;
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:300,display:"flex",justifyContent:"center",alignItems:"flex-start"}}>
      <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:390,background:"#f3f4f6",borderRadius:"0 0 24px 24px",maxHeight:"80vh",overflow:"hidden",display:"flex",flexDirection:"column",boxShadow:"0 8px 32px rgba(0,0,0,0.25)"}}>
        {/* Header */}
        <div style={{background:GREEN,padding:"16px 20px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{color:"#fff",fontWeight:700,fontSize:18}}>Notifikationer</div>
            {unread>0&&<div style={{color:"rgba(255,255,255,0.75)",fontSize:12,marginTop:1}}>{unread} ulæste</div>}
          </div>
          <div style={{display:"flex",gap:12,alignItems:"center"}}>
            {unread>0&&<button onClick={()=>NOTIF_FEED.forEach(n=>markRead(n.id))} style={{background:"none",border:"none",color:"rgba(255,255,255,0.85)",fontSize:12,cursor:"pointer",fontWeight:600}}>Marker alle læst</button>}
            <button onClick={onClose} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",width:30,height:30,borderRadius:"50%",cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
          </div>
        </div>
        {/* List */}
        <div style={{overflowY:"auto",padding:"12px 12px 16px"}}>
          {items.map(n=>(
            <div key={n.id} onClick={()=>{markRead(n.id); onNavigate(n.action.tab); onClose();}}
              style={{background:"#fff",borderRadius:14,padding:"13px 14px",marginBottom:8,cursor:"pointer",display:"flex",alignItems:"flex-start",gap:12,
                border:n.read?"1px solid #f0f0f0":`2px solid ${GREEN}`,
                boxShadow:n.read?"none":"0 2px 8px rgba(45,106,79,0.12)"}}>
              {/* icon + unread dot */}
              <div style={{position:"relative",flexShrink:0}}>
                <div style={{width:40,height:40,borderRadius:"50%",background:n.read?"#f3f4f6":GREEN_LIGHT,display:"flex",alignItems:"center",justifyContent:"center"}}>{notifTypeIcon(n.type, !n.read)}</div>
                {!n.read&&<div style={{position:"absolute",top:0,right:0,width:10,height:10,borderRadius:"50%",background:BADGE_RED,border:"2px solid #fff"}}/>}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:n.read?500:700,fontSize:14,color:"#111",marginBottom:2}}>{n.title}</div>
                <div style={{fontSize:13,color:"#666",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{n.body}</div>
                <div style={{fontSize:11,color:"#aaa",marginTop:4}}>{n.time}</div>
              </div>
              <div style={{color:"#ccc",fontSize:18,alignSelf:"center"}}>›</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

const MONTH_NAMES = ["","Januar","Februar","Marts","April","Maj","Juni","Juli","August","September","Oktober","November","December"];
const DAY_NAMES_SHORT = ["Søn","Man","Tir","Ons","Tor","Fre","Lør"];
const DAY_NAMES_MIN = ["S","M","T","O","T","F","L"];

function getWeekNumber(year, month, day) {
  const d = new Date(year, month-1, day);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 4 - (d.getDay()||7));
  const yearStart = new Date(d.getFullYear(),0,1);
  return Math.ceil((((d - yearStart) / 86400000) + 1)/7);
}

function getDaysInMonth(year, month) {
  return new Date(year, month, 0).getDate();
}

function getFirstDayOfMonth(year, month) {
  let d = new Date(year, month-1, 1).getDay();
  return d === 0 ? 6 : d - 1; // Monday-first
}

function getMonthGrid(year, month) {
  const firstDow = getFirstDayOfMonth(year, month);
  const daysInMonth = getDaysInMonth(year, month);
  const grid = [];
  for (let i = 0; i < firstDow; i++) grid.push(null);
  for (let d = 1; d <= daysInMonth; d++) grid.push(d);
  while (grid.length % 7 !== 0) grid.push(null);
  return grid;
}

function getMondayOfWeek(year, month, day) {
  const d = new Date(year, month-1, day);
  const dow = d.getDay() === 0 ? 6 : d.getDay() - 1;
  d.setDate(d.getDate() - dow);
  return {year: d.getFullYear(), month: d.getMonth()+1, day: d.getDate()};
}

function addDays(year, month, day, n) {
  const d = new Date(year, month-1, day);
  d.setDate(d.getDate() + n);
  return {year: d.getFullYear(), month: d.getMonth()+1, day: d.getDate()};
}

// My wishes for dp1 – keyed as "weekNum-behovId-dayIndex" → "ønsket"|"godkendt"|"afvist"
const INIT_DIALOG_WISHES = {
  "14-b1-0":"ønsket","14-b1-1":"ønsket","14-b3-4":"ønsket",
  "15-b1-0":"godkendt","15-b1-1":"godkendt","15-b3-2":"godkendt",
  "16-b1-0":"ønsket","16-b2-3":"ønsket",
  "17-b3-4":"afvist",
};

const DAY_COLS = ["M","T","O","T","F","L","S"];
const DAY_FULL = ["Man","Tir","Ons","Tor","Fre","Lør","Søn"];

function DialogplanScreen({onBack, embedded=false}) {
  const [period, setPeriod] = useState(DIALOG_PERIODS[0]);
  const [wishes, setWishes] = useState(INIT_DIALOG_WISHES);
  const [activeWeek, setActiveWeek] = useState(14);
  const [expandCat, setExpandCat] = useState({Dag:true, Aften:true, Nat:false});
  const [saved, setSaved] = useState(false);
  const [showSummary, setShowSummary] = useState(false);

  const isActive = period.status === "aktiv";

  // Count hours wished this week
  const weekHours = DIALOG_BEHOV.reduce((sum, b) => {
    return sum + DAY_COLS.reduce((ds, _, di) => {
      const key = `${activeWeek}-${b.id}-${di}`;
      const w = wishes[key];
      if (w && w !== "afvist") {
        const [sh,sm] = b.start.split(":").map(Number);
        const [eh,em] = b.end.split(":").map(Number);
        let h = (eh*60+em - sh*60-sm)/60;
        if (h < 0) h += 24;
        return ds + h;
      }
      return ds;
    }, 0);
  }, 0);

  const totalWished = Object.values(wishes).filter(v=>v==="ønsket"||v==="godkendt").length;
  const totalGodkendt = Object.values(wishes).filter(v=>v==="godkendt").length;
  const totalAfvist = Object.values(wishes).filter(v=>v==="afvist").length;

  function toggleWish(behovId, dayIdx) {
    if (!isActive) return;
    const key = `${activeWeek}-${behovId}-${dayIdx}`;
    const cur = wishes[key];
    if (!cur) setWishes(w => ({...w, [key]:"ønsket"}));
    else if (cur === "ønsket") setWishes(w => { const n={...w}; delete n[key]; return n; });
    // godkendt/afvist can't be toggled by user
  }

  // Category grouping
  const cats = [...new Set(DIALOG_BEHOV.map(b=>b.category))];

  // Status colors
  const wCfg = {
    ønsket:   {bg:"#dbeafe", border:"#3B82F6", text:BADGE_BLUE,   icon:"check"},
    godkendt: {bg:"#dcfce7", border:GREEN,      text:GREEN,        icon:"check"},
    afvist:   {bg:"#fee2e2", border:BADGE_RED,  text:BADGE_RED,    icon:"x"},
  };

  const periodStatusCfg = {
    aktiv:     {bg:"#dcfce7", text:GREEN,        label:"Ønskeperiode åben",  icon:"circle"},
    lukket:    {bg:"#f3f4f6", text:"#6B7280",    label:"Periode lukket",     icon:"lock"},
    udruller:  {bg:"#fffbeb", text:"#92400e",    label:"Planen udrulles",    icon:"hourglass"},
  };
  const psc = periodStatusCfg[period.status];

  return (
    <div style={{padding:embedded?"0":"16px 16px 0"}}>
      {!embedded&&<BackBtn onBack={onBack} label="← Tilbage"/>}

      {/* Header */}

function TimeDiff({plan, reg}) {
  if (!plan || !reg) return null;
  const toMins = t => { const [h,m]=t.split(":").map(Number); return h*60+m; };
  const planMins = toMins(plan);
  const regMins  = toMins(reg);
  const diff = regMins - planMins;
  if (diff === 0) return null;
  const abs = Math.abs(diff);
  const h = Math.floor(abs/60), m = abs%60;
  const str = `${diff>0?"+":"−"}${h>0?h+"t ":""}${m>0?m+"m":""}`;
  return <span style={{fontSize:11,fontWeight:600,color:diff>0?"#059669":BADGE_RED,marginLeft:4}}>{str}</span>;
}

  return (

          <div>
            <div style={{fontWeight:700,fontSize:18}}>{item.date}</div>
            <div style={{color:"#888",fontSize:13}}>{item.code} · Plan: {item.planStart}–{item.planEnd}</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,color:"#aaa",cursor:"pointer"}}>×</button>

        {/* Time inputs */}
        <div style={{background:"#fff",borderRadius:14,padding:"14px 16px",marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:13,color:"#888",marginBottom:10,textTransform:"uppercase",letterSpacing:0.5}}>Registreret tid</div>
          <div style={{display:"flex",gap:12,alignItems:"center"}}>
            <div style={{flex:1}}><label style={{fontSize:12,color:"#aaa",display:"block",marginBottom:4}}>Start</label>
              <input type="time" value={regStart} onChange={e=>setRegStart(e.target.value)} disabled={item.status==="godkendt"} style={{...inp,padding:"8px 10px",opacity:item.status==="godkendt"?0.5:1}}/></div>
            <div style={{color:"#ccc",paddingTop:18}}>–</div>
            <div style={{flex:1}}><label style={{fontSize:12,color:"#aaa",display:"block",marginBottom:4}}>Slut</label>
              <input type="time" value={regEnd} onChange={e=>setRegEnd(e.target.value)} disabled={item.status==="godkendt"} style={{...inp,padding:"8px 10px",opacity:item.status==="godkendt"?0.5:1}}/></div>
          </div>
        </div>
        <div style={{background:"#fff",borderRadius:14,padding:"12px 16px",marginBottom:16}}>
          <label style={{fontSize:13,color:"#888",display:"block",marginBottom:6}}>Kommentar til skemalægger</label>
          <textarea value={comment} onChange={e=>setComment(e.target.value)} disabled={item.status==="godkendt"} placeholder="Tilføj en kommentar..." style={{...inp,minHeight:60,resize:"none",opacity:item.status==="godkendt"?0.5:1}}/>
        </div>
        {item.status!=="godkendt" &&
          <button onClick={()=>{setSaved(true);setTimeout(()=>{setSaved(false);onClose();},1500);}}
            style={{...btnP,width:"100%"}}>{saved?"✓ Sendt til godkendelse":"Indsend registrering"}</button>}
        {item.status==="godkendt" && <div style={{textAlign:"center",color:GREEN,fontWeight:600,fontSize:14,paddingTop:8}}>Registrering godkendt – kan ikke redigeres</div>}
      </div>
    </div>
  );
}

function VejviserScreen({onContactClick}){
  const [search,setSearch]=useState("");
  const filtered=CONTACTS.filter(c=>c.name.toLowerCase().includes(search.toLowerCase())||c.title.toLowerCase().includes(search.toLowerCase()));
  const groups={};
  filtered.forEach(c=>{const l=c.name[0].toUpperCase();if(!groups[l])groups[l]=[];groups[l].push(c);});
  return(
    <div style={{padding:"16px 16px 0"}}>
      <div style={{fontWeight:700,fontSize:24,marginBottom:12}}>Vejviser</div>
      <div style={{position:"relative",marginBottom:20}}>
        <svg style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Søg navn eller stilling..." style={{...inp,paddingLeft:38}}/>
      </div>
      {Object.keys(groups).sort().map(letter=>(
        <div key={letter}>
          <div style={{fontWeight:700,fontSize:13,color:GREEN,marginBottom:6,marginTop:4,letterSpacing:1}}>{letter}</div>
          {groups[letter].map(c=>(
            <Card key={c.id} onClick={()=>onContactClick(c)} style={{border:"1.5px solid #e5e7eb"}}>
              <div style={{display:"flex",alignItems:"center",gap:14}}>

      {msgs.map(msg=>(
        <Card key={msg.id} onClick={()=>onMsgClick(msg)} style={{border:msg.read?"1.5px solid #e5e7eb":`2px solid ${GREEN}`,position:"relative"}}>
          {!msg.read&&<div style={{position:"absolute",top:14,right:14,width:10,height:10,borderRadius:"50%",background:GREEN}}/>}
          <div style={{fontWeight:msg.read?600:800,fontSize:15,marginBottom:2,paddingRight:20}}>{msg.subject}</div>
          <div style={{color:"#888",fontSize:12,marginBottom:4}}>{msg.from} · {msg.date}</div>
          <div style={{color:"#666",fontSize:13,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{msg.body.split("\n")[0]}</div>
        </Card>
      ))}
    </div>
  );
}

function VejviserSubTab({onContactClick}){
  const [search,setSearch]=useState("");
  const filtered=CONTACTS.filter(c=>c.name.toLowerCase().includes(search.toLowerCase())||c.title.toLowerCase().includes(search.toLowerCase()));
  const groups={};
  filtered.forEach(c=>{const l=c.name[0].toUpperCase();if(!groups[l])groups[l]=[];groups[l].push(c);});
  return(
    <div>
      <div style={{position:"relative",marginBottom:16}}>
        <svg style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Søg navn eller stilling..." style={{...inp,paddingLeft:38}}/>
      </div>
      {Object.keys(groups).sort().map(letter=>(
        <div key={letter}>
          <div style={{fontWeight:700,fontSize:13,color:GREEN,marginBottom:6,marginTop:4,letterSpacing:1}}>{letter}</div>
          {groups[letter].map(ct=>(
            <Card key={ct.id} onClick={()=>onContactClick(ct)} style={{border:"1.5px solid #e5e7eb"}}>
              <div style={{display:"flex",alignItems:"center",gap:14}}>
                <div style={{width:44,height:44,borderRadius:"50%",background:GREEN_LIGHT,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:GREEN,flexShrink:0}}>{ct.name.split(" ").map(n=>n[0]).join("").slice(0,2)}</div>
                <div style={{flex:1}}><div style={{fontWeight:700,fontSize:15}}>{ct.name}</div><div style={{color:"#888",fontSize:13}}>{ct.title}</div></div>
                {ct.showPrivate&&<Icon name="phone" size={14} color={GREEN}/>}
              </div>
            </Card>
          ))}
        </div>
      ))}
      {filtered.length===0&&<div style={{textAlign:"center",color:"#aaa",marginTop:40}}>Ingen resultater</div>}
    </div>
  );
}

const INIT_PROFILE={
  name:"Sarah Dalgaard",title:"Social/Sundhedsass.",
  workEmail:"sarah.d@hospital.dk",workPhone:"3812 4410",
  privatePhone:"",privateEmail:"",showPrivate:false,
  appNotifMaster:true,
  notif_app_Tidsregistrering:true,notif_app_Byt:true,notif_app_Onske:true,notif_app_Udbud:true,notif_app_Beskeder:true,notif_app_Glob:false,
  notif_email_Tidsregistrering:false,notif_email_Byt:true,notif_email_Onske:true,notif_email_Udbud:true,notif_email_Beskeder:false,notif_email_Glob:false,
  notif_priv_Tidsregistrering:false,notif_priv_Byt:false,notif_priv_Onske:false,notif_priv_Udbud:false,notif_priv_Beskeder:false,notif_priv_Glob:false,
};

function LoginScreen({onLogin}){
  const [code,setCode]=useState("");
  const [error,setError]=useState(false);
  const [shake,setShake]=useState(false);

  const handleDigit=d=>{
    if(code.length>=4)return;
    const next=code+d;
    setCode(next);
    setError(false);
    if(next.length===4){
      if(next==="1234"){
        setTimeout(()=>onLogin(),200);
      } else {
        setTimeout(()=>{
          setError(true);
          setShake(true);
          setTimeout(()=>{setCode("");setShake(false);},600);
        },200);
      }
    }
  };
  const handleDel=()=>{setCode(c=>c.slice(0,-1));setError(false);};

  const dots=Array.from({length:4},(_,i)=>({filled:i<code.length}));
  const keys=[["1","2","3"],["4","5","6"],["7","8","9"],["","0","⌫"]];

  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#f3f4f6",padding:24,fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"}}>
      {/* Logo area */}
      <div style={{marginBottom:40,textAlign:"center"}}>
        <div style={{width:72,height:72,borderRadius:22,background:GREEN,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",boxShadow:"0 8px 24px rgba(45,106,79,0.35)"}}>
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </div>
        <div style={{fontWeight:800,fontSize:26,color:"#111",letterSpacing:-0.5}}>Min Vagtplan</div>
        <div style={{color:"#9CA3AF",fontSize:14,marginTop:4}}>Indtast din PIN-kode</div>
      </div>

      {/* Dots */}
      <div style={{display:"flex",gap:18,marginBottom:36,transform:shake?"translateX(-6px)":"none",transition:"transform 0.1s"}}>
        {dots.map((dot,i)=>(
          <div key={i} style={{width:18,height:18,borderRadius:"50%",background:error?"#EF4444":dot.filled?GREEN:"transparent",border:"2px solid "+(error?"#EF4444":dot.filled?GREEN:"#D1D5DB"),transition:"background 0.15s, border-color 0.15s"}}/>
        ))}
      </div>
      {error&&<div style={{color:"#EF4444",fontSize:13,marginTop:-24,marginBottom:20,fontWeight:500}}>Forkert kode – prøv igen</div>}

      {/* Keypad */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,72px)",gap:14}}>
        {keys.flat().map((k,i)=>{
          if(k==="")return <div key={i}/>;
          const isDel=k==="⌫";
          return(
            <button key={i} onClick={()=>isDel?handleDel():handleDigit(k)}
              style={{width:72,height:72,borderRadius:"50%",border:"none",background:isDel?"transparent":"#fff",fontSize:isDel?22:26,fontWeight:isDel?400:500,color:"#111",cursor:"pointer",boxShadow:isDel?"none":"0 2px 8px rgba(0,0,0,0.08)",display:"flex",alignItems:"center",justifyContent:"center",transition:"background 0.1s",WebkitTapHighlightColor:"transparent"}}
              onMouseDown={e=>e.currentTarget.style.background=isDel?"rgba(0,0,0,0.05)":"#f0f0f0"}
              onMouseUp={e=>e.currentTarget.style.background=isDel?"transparent":"#fff"}
              onTouchStart={e=>e.currentTarget.style.background=isDel?"rgba(0,0,0,0.05)":"#f0f0f0"}
              onTouchEnd={e=>e.currentTarget.style.background=isDel?"transparent":"#fff"}
            >{k}</button>
          );
        })}
      </div>

      <div style={{marginTop:40,color:"#C4C4C4",fontSize:12}}>Glemt kode? Kontakt din leder</div>
    </div>
  );
}

function App(){
  const [loggedIn, setLoggedIn] = useState(false);
  const [mainTab,  setMainTab]   = useState("oversigt");
  const [screen,   setScreen]    = useState(null);
  const [showCreate, setCreate]  = useState(false);
  const [profile,  setProfile]   = useState(INIT_PROFILE);
  const [readMsgIds, setReadMsgIds] = useState(new Set());
  const [readNotifIds, setReadNotifIds] = useState(new Set());
  const [showNotifPanel, setShowNotifPanel] = useState(false);

  const allMsgs  = [...ORG_MSGS,...DEPT_MSGS];
  const unreadMsgs   = allMsgs.filter(m=>!m.read&&!readMsgIds.has(m.id)).length;
  const unreadNotifs = NOTIF_FEED.filter(n=>!n.read&&!readNotifIds.has(n.id)).length;

  const push  = (type,data) => setScreen({type,data});
  const pop   = () => setScreen(null);
  const switchTab = t => { setScreen(null); setMainTab(t); };

  const openMsg = msg => { setReadMsgIds(s=>new Set([...s,msg.id])); push("msgDetail",msg); };
  const markNotifRead = id => setReadNotifIds(s=>new Set([...s,id]));

  const anmodCount = BYT_ITEMS.filter(i=>i.status.startsWith("Afventer")).length;

  if(!loggedIn) return(
    <div style={{display:"flex",justifyContent:"center",background:"#f3f4f6",minHeight:"100vh"}}>
      <div style={{width:"100%",maxWidth:390}}>
        <LoginScreen onLogin={()=>setLoggedIn(true)}/>
      </div>
    </div>
  );
  return(
    <div style={{fontFamily:"-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif",background:"#f3f4f6",minHeight:"100vh",display:"flex",justifyContent:"center"}}>
      <div style={{width:"100%",maxWidth:390,background:"#f3f4f6",minHeight:"100vh",position:"relative"}}>
        <TopHeader onNotifClick={()=>setShowNotifPanel(true)} unread={unreadNotifs}/>

        <div style={{paddingBottom:88,overflowY:"auto"}}>
          {/* Overlay screens */}
          {screen?.type==="shiftDetail"   &&<ShiftDetailScreen   shift={screen.data}   onBack={pop} onCreateByt={s=>push("opretByt",s)} onCreateOnske={s=>push("opretOnske",s)}/>}
          {screen?.type==="opretByt"      &&<OpretBytScreen      shift={screen.data}   onBack={pop} onSubmit={()=>{alert("Bytteforespørgsel sendt!");pop();}}/>}
          {screen?.type==="opretOnske"    &&<OpretOnskeScreen    shift={screen.data}   onBack={pop} onSubmit={()=>{alert("Ønske sendt!");pop();}}/>}
          {screen?.type==="bytDetail"     &&<BytDetailScreen     item={screen.data}    onBack={pop}/>}
          {screen?.type==="onskeDetail"   &&<OnskeDetailScreen   item={screen.data}    onBack={pop}/>}
          {screen?.type==="udbudDetail"   &&<UdbudDetailScreen   item={screen.data}    onBack={pop}/>}
          {screen?.type==="msgDetail"     &&<MsgDetailScreen     msg={screen.data}     onBack={pop}/>}
          {screen?.type==="contactDetail" &&<ContactDetailScreen contact={screen.data} onBack={pop}/>}
          {screen?.type==="dialogplan"    &&<DialogplanScreen onBack={pop}/>}

          {/* Main tabs */}
          {!screen&&mainTab==="oversigt"      &&<OversiktScreen onShiftClick={s=>push("shiftDetail",s)}/>}
          {!screen&&mainTab==="afdeling"      &&<AfdelingsplanScreen/>}
          {!screen&&mainTab==="planlaegning"  &&<PlanlaegningScreen
            onBytDetail={item=>push("bytDetail",item)}
            onOnskeDetail={item=>push("onskeDetail",item)}
            onUdbudDetail={item=>push("udbudDetail",item)}
            showCreate={showCreate} setCreate={setCreate}
            onCreateByt={()=>{setCreate(false);push("opretByt",SHIFTS[0]);}}
            onCreateOnske={()=>{setCreate(false);push("opretOnske",SHIFTS[0]);}}/>}
          {!screen&&mainTab==="kommunikation" &&<KommunikationScreen
            onMsgClick={openMsg}
            onContactClick={ct=>push("contactDetail",ct)}/>}
          {!screen&&mainTab==="mig"           &&<MigScreen profile={profile} onSave={p=>setProfile(p)}/>}

        </div>

        <BottomNav tab={mainTab} setTab={switchTab} anmodCount={anmodCount} unreadMsgs={unreadMsgs}/>

        {/* Notifikationspanel */}
        {showNotifPanel&&(
          <NotifPanel
            onClose={()=>setShowNotifPanel(false)}
            onNavigate={switchTab}
            readNotifIds={readNotifIds}
            markRead={markNotifRead}
          />
        )}
      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
